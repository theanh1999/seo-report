            if (comp.ga4 && comp.ga4.sessions) {

                        <td>${k.query}</td>
                        <td>${formatNumber(k.clicks)}</td>
                        <td>${formatNumber(k.impressions)}</td>
                        <td>${formatPercent(k.ctr)}</td>
                        <td>${k.position.toFixed(2)}</td>
                    </tr>
                `;
            });
        }
        
        // Populate pages table
        function populatePages() {
            const pages = domainData.gsc_pages.rows || [];
            const tbody = document.getElementById('pagesBody');
            
            if (pages.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="no-data">Chưa có dữ liệu</td></tr>';
                return;
            }
            
            pages.slice(0, 10).forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td style="max-width: 400px; overflow: hidden; text-overflow: ellipsis;">${p.page}</td>
                        <td>${formatNumber(p.clicks)}</td>
                        <td>${formatNumber(p.impressions)}</td>
                        <td>${formatPercent(p.ctr)}</td>
                        <td>${p.position.toFixed(2)}</td>
                    </tr>
                `;
            });
        }
        
        // Create charts
        function createCharts() {
            const ga4 = domainData.ga4.rows || [];
            const gsc = domainData.gsc_daily.rows || [];
            
            const gaLast30 = ga4.slice(-30);
            const gscLast30 = gsc.slice(-30);
            
            const gaDateLabels = gaLast30.map(r => r.date);
            const gscDateLabels = gscLast30.map(r => r.date);
            
            // Sessions chart
            if (gaLast30.length > 0) {
                new Chart(document.getElementById('sessionsChart'), {
                    type: 'line',
                    data: {
                        labels: gaDateLabels,
                        datasets: [{
                            label: 'Phiên',
                            data: gaLast30.map(r => r.sessions),
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: true }, },
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }
            
            // Bounce rate chart
            if (gaLast30.length > 0) {
                new Chart(document.getElementById('bounceChart'), {
                    type: 'line',
                    data: {
                        labels: gaDateLabels,
                        datasets: [{
                            label: 'Tỷ lệ thoát (%)',
                            data: gaLast30.map(r => r.bounce_rate * 100),
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            borderWidth: 2,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true, max: 100 } }
                    }
                });
            }
            
            // Clicks chart
            if (gscLast30.length > 0) {
                new Chart(document.getElementById('clicksChart'), {
                    type: 'line',
                    data: {
                        labels: gscDateLabels,
                        datasets: [{
                            label: 'Nhấp',
                            data: gscLast30.map(r => r.clicks),
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }
            
            // Position chart (reversed Y axis - lower is better)
            if (gscLast30.length > 0) {
                new Chart(document.getElementById('positionChart'), {
                    type: 'line',
                    data: {
                        labels: gscDateLabels,
                        datasets: [{
                            label: 'Vị trí (thấp = tốt)',
                            data: gscLast30.map(r => r.position),
                            borderColor: '#f59e0b',
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            borderWidth: 2,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: false,
                                reverse: true
                            }
                        }
                    }
                });
            }
        }
        
        populateKPIs();
        populateKeywords();
        populatePages();
        createCharts();
    </script>
</body>
</html>
