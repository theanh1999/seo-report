        // Populate KPIs
        function populateKPIs() {
            const comp = domainData.comparison;
            const kpis = [];
            
            if (comp.ga4 && comp.ga4.sessions) {
                kpis.push({
                    label: 'Phiên',
                    value: formatNumber(comp.ga4.sessions.last_30.total),
                    change: comp.ga4.sessions.pct_change
                });
            }
            
            if (comp.ga4 && comp.ga4.active_users) {
                kpis.push({
                    label: 'Người dùng',
                    value: formatNumber(comp.ga4.active_users.last_30.total),
                    change: comp.ga4.active_users.pct_change
                });
            }

                kpis.push({

                    change: comp.gsc_daily.clicks.pct_change

                    change: 0

            }

            // Clicks chart
            if (gscLast30.length > 0) {
                new Chart(document.getElementById('clicksChart'), {
                    type: 'line',
                    data: {
                        labels: gscDateLabels,
                        datasets: [{
                            label: 'Nhấp',
                            data: gscLast30.map(r => r.clicks),
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }
            
            // Position chart (reversed Y axis - lower is better)
            if (gscLast30.length > 0) {
                new Chart(document.getElementById('positionChart'), {
                    type: 'line',
                    data: {
                        labels: gscDateLabels,
                        datasets: [{
                            label: 'Vị trí (thấp = tốt)',
                            data: gscLast30.map(r => r.position),
                            borderColor: '#f59e0b',
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            borderWidth: 2,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: false,
                                reverse: true
                            }
                        }
                    }
                });
            }
        }
        
        populateKPIs();
        populateKeywords();
        populatePages();
        createCharts();
    </script>
</body>
</html>
