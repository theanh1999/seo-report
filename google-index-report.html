<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Index Report</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(148, 163, 184, 0.1);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .header-date {
            color: #94a3b8;
            font-size: 14px;
        }

        .nav-link {
            display: inline-block;
            margin-left: 20px;
            padding: 8px 16px;
            background: #1e293b;
            color: #22c55e;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            border: 1px solid #22c55e;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: #22c55e;
            color: #0f172a;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .kpi-card {
            background: #1e293b;
            padding: 24px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
        }

        .kpi-card:hover {
            border-color: rgba(148, 163, 184, 0.2);
            transform: translateY(-2px);
        }

        .kpi-label {
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .kpi-change {
            font-size: 12px;
            color: #94a3b8;
        }

        .kpi-nha-hang { color: #22c55e; }
        .kpi-hotel { color: #a855f7; }
        .kpi-doi-thu { color: #ef4444; }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(148, 163, 184, 0.1);
        }

        .chart-container {
            background: #1e293b;
            padding: 24px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            margin-bottom: 20px;
            position: relative;
        }

        .chart-wrapper {
            position: relative;
            height: 400px;
            width: 100%;
        }

        .group-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100%, 1fr));
            gap: 24px;
        }

        .group-section {
            background: #1e293b;
            padding: 24px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .group-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .domain-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.05);
            gap: 16px;
        }

        .domain-row:last-child {
            border-bottom: none;
        }

        .domain-name {
            flex: 0 0 200px;
            font-size: 14px;
            font-weight: 500;
            word-break: break-word;
        }

        .domain-bar-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .domain-bar {
            height: 24px;
            border-radius: 4px;
            background: rgba(148, 163, 184, 0.1);
            position: relative;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .domain-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .group-nha-hang .domain-bar-fill { background: #22c55e; }
        .group-hotel .domain-bar-fill { background: #a855f7; }
        .group-doi-thu .domain-bar-fill { background: #ef4444; }

        .domain-value {
            flex: 0 0 120px;
            text-align: right;
            font-weight: 600;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .domain-name {
                flex: 0 0 140px;
                font-size: 12px;
            }

            .domain-value {
                flex: 0 0 100px;
                font-size: 12px;
            }

            .kpi-value {
                font-size: 24px;
            }

            .chart-wrapper {
                height: 300px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .kpi-card {
                padding: 16px;
            }

            .domain-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .domain-bar-container {
                width: 100%;
            }

            .domain-value {
                width: 100%;
                text-align: left;
            }
        }
    </style>
</head>

        // Helper function to format numbers with commas
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // Helper function to format large numbers
        function formatLarge(v) {
            if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
            if (v >= 1e3) return (v / 1e3).toFixed(0) + 'K';
            return v;
        }

        // Load data
        const data = EMBEDDED_DATA;
        const latestData = data[data.length - 1];
        const prevData = data.length > 1 ? data[data.length - 2] : null;

        // Update KPI cards
        function updateKPIs() {
            const total = latestData.totals.nha_hang + latestData.totals.hotel + latestData.totals.doi_thu;
            const prevTotal = prevData ? prevData.totals.nha_hang + prevData.totals.hotel + prevData.totals.doi_thu : total;

            document.getElementById('kpiTotal').textContent = formatNumber(total);
            document.getElementById('kpiTotalChange').textContent = 'vs ' + formatNumber(prevTotal) + ' (' + (((total - prevTotal) / prevTotal * 100).toFixed(1)) + '%)';

            document.getElementById('kpiNhaHang').textContent = formatNumber(latestData.totals.nha_hang);
            document.getElementById('kpiNhaHangChange').textContent = 'vs ' + formatNumber(prevData ? prevData.totals.nha_hang : latestData.totals.nha_hang);

            document.getElementById('kpiHotel').textContent = formatNumber(latestData.totals.hotel);
            document.getElementById('kpiHotelChange').textContent = 'vs ' + formatNumber(prevData ? prevData.totals.hotel : latestData.totals.hotel);

            document.getElementById('kpiDoiThu').textContent = formatNumber(latestData.totals.doi_thu);
            document.getElementById('kpiDoiThuChange').textContent = 'vs ' + formatNumber(prevData ? prevData.totals.doi_thu : latestData.totals.doi_thu);

            const ratio = ((latestData.totals.nha_hang + latestData.totals.hotel) / latestData.totals.doi_thu * 100).toFixed(2);
            const prevRatio = prevData ? ((prevData.totals.nha_hang + prevData.totals.hotel) / prevData.totals.doi_thu * 100).toFixed(2) : ratio;
            document.getElementById('kpiRatio').textContent = ratio + '%';
            document.getElementById('kpiRatioChange').textContent = 'vs ' + prevRatio + '%';
        }

        // Create trend chart
        function createTrendChart() {
            // Get last 30 days
            const last30 = data.slice(Math.max(0, data.length - 30));
            const labels = last30.map(d => {
                const date = new Date(d.date);
                return (date.getMonth() + 1) + '/' + date.getDate();
            });

            const nhahangData = last30.map(d => d.totals.nha_hang);
            const hotelData = last30.map(d => d.totals.hotel);
            const doithuData = last30.map(d => d.totals.doi_thu);

            const ctx = document.getElementById('trendChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Nha Hang',
                            data: nhahangData,
                            borderColor: '#22c55e',
                            backgroundColor: 'rgba(34, 197, 94, 0.1)',
                            tension: 0.3,
                            fill: true,
                            borderWidth: 2,
                            pointRadius: 0,
                            pointHoverRadius: 6,
                            pointBackgroundColor: '#22c55e'
                        },
                        {
                            label: 'Hotel',
                            data: hotelData,
                            borderColor: '#a855f7',
                            backgroundColor: 'rgba(168, 85, 247, 0.1)',
                            tension: 0.3,
                            fill: true,
                            borderWidth: 2,
                            pointRadius: 0,
                            pointHoverRadius: 6,
                            pointBackgroundColor: '#a855f7'
                        },
                        {
                            label: 'Doi Thu',
                            data: doithuData,
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            tension: 0.3,
                            fill: true,
                            borderWidth: 2,
                            pointRadius: 0,
                            pointHoverRadius: 6,
                            pointBackgroundColor: '#ef4444'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#f1f5f9',
                                font: { size: 13 },
                                padding: 15
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: {
                                color: 'rgba(148, 163, 184, 0.1)'
                            },
                            ticks: {
                                color: '#94a3b8',
                                callback: function(value) {
                                    return formatLarge(value);
                                }
                            }
                        },
                        x: {
                            grid: {
                                color: 'rgba(148, 163, 184, 0.1)'
                            },
                            ticks: {
                                color: '#94a3b8'
                            }
                        }
                    }
                }
            });
        }

        // Render rankings
        function renderRankings() {
            // Nha Hang
            const nhahangSorted = Object.entries(latestData.nha_hang).sort((a, b) => b[1] - a[1]);
            const nhahangMax = Math.max(...nhahangSorted.map(x => x[1]));
            const nhahangHtml = nhahangSorted.map(([domain, count]) => {
                const percent = (count / nhahangMax) * 100;
                return `
                    <div class="domain-row">
                        <div class="domain-name">${domain}</div>
                        <div class="domain-bar-container">
                            <div class="domain-bar">
                                <div class="domain-bar-fill" style="width: ${percent}%"></div>
                            </div>
                            <div class="domain-value">${formatNumber(count)}</div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('nhahangRanking').innerHTML = nhahangHtml;

            // Hotel
            const hotelSorted = Object.entries(latestData.hotel).sort((a, b) => b[1] - a[1]);
            const hotelMax = Math.max(...hotelSorted.map(x => x[1]));
            const hotelHtml = hotelSorted.map(([domain, count]) => {
                const percent = (count / hotelMax) * 100;
                return `
                    <div class="domain-row">
                        <div class="domain-name">${domain}</div>
                        <div class="domain-bar-container">
                            <div class="domain-bar">
                                <div class="domain-bar-fill" style="width: ${percent}%"></div>
                            </div>
                            <div class="domain-value">${formatNumber(count)}</div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('hotelRanking').innerHTML = hotelHtml;

            // Doi Thu (Top 15)
            const doithuSorted = Object.entries(latestData.doi_thu).sort((a, b) => b[1] - a[1]).slice(0, 15);
            const doithuMax = Math.max(...doithuSorted.map(x => x[1]));
            const doithuHtml = doithuSorted.map(([domain, count]) => {
                const percent = (count / doithuMax) * 100;
                return `
                    <div class="domain-row">
                        <div class="domain-name">${domain}</div>
                        <div class="domain-bar-container">
                            <div class="domain-bar">
                                <div class="domain-bar-fill" style="width: ${percent}%"></div>
                            </div>
                            <div class="domain-value">${formatNumber(count)}</div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('doithuRanking').innerHTML = doithuHtml;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateKPIs();
            createTrendChart();
            renderRankings();
        });
    </script>
