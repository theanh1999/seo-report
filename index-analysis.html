function fmtDate(d) { var p=d.split('-'); return p[2]+'/'+p[1]; }
function fmtNum(v) { if(v>=1e6) return (v/1e6).toFixed(1)+'M'; if(v>=1e3) return (v/1e3).toFixed(0)+'K'; return v; }
function sid(s) { return s.replace(/[^a-zA-Z0-9]/g,'_'); }

function getFiltered() {
    if(currentRange >= 9999) return HISTORY;
    return HISTORY.slice(-currentRange);
}

function destroyChart(id) {
    if(allCharts[id]) { allCharts[id].destroy(); delete allCharts[id]; }
}

function setRange(d) {
    currentRange = d;
    document.querySelectorAll('.fbtn').forEach(function(b){
        b.classList.toggle('active', parseInt(b.getAttribute('data-d'))===d);
    });
    // Rebuild all created tabs
    Object.keys(tabCreated).forEach(function(t){
        if(tabCreated[t]) { tabCreated[t]=false; buildTab(t); }
    });
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
    event.target.classList.add('active');
    document.getElementById('sec-'+tab).classList.add('active');
    if(!tabCreated[tab]) { buildTab(tab); }
}

function buildTab(tab) {
    tabCreated[tab] = true;
    if(tab === 'all') { buildOverview(); }
    else { buildGroupTab(tab); }
}

function buildOverview() {
    destroyChart('ch-overview');
    var data = getFiltered();
    var labels = data.map(function(e){return fmtDate(e.date)});
    var datasets = GROUPS.map(function(g){
        return {
            label: GROUP_LABELS[g],
            data: data.map(function(e){return (e.totals||{})[g]||0}),
            borderColor: GROUP_COLORS[g],
            backgroundColor: GROUP_COLORS[g]+'20',
            fill:true, tension:0.3, pointRadius: data.length>40?0:3

    });

        var trend7 = last7.length>=2 && last7[0]>0 ? ((last7[last7.length-1]-last7[0])/last7[0]*100).toFixed(1) : 'N/A';

        html += '<div class="domain-card">';
        html += '<h4>'+dom+'</h4>';
        html += '<div class="stats">';
        html += '<div><div class="val">'+fmtNum(current)+'</div>Hiện tại</div>';
        html += '<div><div class="val">'+fmtNum(maxV)+'</div>Cao nhất</div>';
        html += '<div><div class="val">'+(typeof growth==='string'&&growth==='N/A'?'N/A':growth+'%')+'</div>Tăng trưởng</div>';
        html += '</div>';
        html += '<div class="domain-chart"><canvas id="dch-'+did+'"></canvas></div>';
        html += '</div>';
    });
    html += '</div>';

    sec.innerHTML = html;

    // Build multi-line chart
    var mlDatasets = domains.map(function(dom, i) {
        return {
            label: dom,
            data: data.map(function(e){return (e[group]||{})[dom]||0}),
            borderColor: PALETTE[i % PALETTE.length],
            tension:0.3,
            pointRadius: data.length>40?0:2,
            borderWidth:2
        };
    });
    allCharts[mlId] = new Chart(document.getElementById(mlId).getContext('2d'), {
        type:'line',
        data:{labels:labels, datasets:mlDatasets},
        options:{
            responsive:true, maintainAspectRatio:false, animation:false,
            plugins:{legend:{position:'bottom',labels:{color:'#f1f5f9',boxWidth:12,font:{size:11}}}},
            scales:{
                x:{ticks:{color:'#94a3b8',maxRotation:45,maxTicksLimit:20},grid:{color:'rgba(148,163,184,0.1)'}},
                y:{ticks:{color:'#94a3b8',callback:function(v){return fmtNum(v)}},grid:{color:'rgba(148,163,184,0.1)'}}
            }
        }
    });

    // Pie chart — current values
    var lastEntry = data[data.length-1];
    var pieData = domains.map(function(dom){return (lastEntry[group]||{})[dom]||0});
    var pieColors = domains.map(function(_,i){return PALETTE[i%PALETTE.length]});
    allCharts[pieId] = new Chart(document.getElementById(pieId).getContext('2d'), {
        type:'doughnut',
        data:{labels:domains, datasets:[{data:pieData, backgroundColor:pieColors}]},
        options:{
            responsive:true, maintainAspectRatio:false, animation:false,
            plugins:{legend:{position:'right',labels:{color:'#f1f5f9',boxWidth:10,font:{size:10}}}}
        }
    });

    // Growth bar chart
    var growthData = domains.map(function(dom) {
        var vals = data.map(function(e){return (e[group]||{})[dom]||0});
        var first=0; for(var i=0;i<vals.length;i++){if(vals[i]>0){first=vals[i];break}}
        var last = vals[vals.length-1];
        return first>0 ? ((last-first)/first*100) : 0;
    });
    var growthColors = growthData.map(function(v){return v>=0?'#22c55e':'#ef4444'});
    allCharts[growId] = new Chart(document.getElementById(growId).getContext('2d'), {
        type:'bar',
        data:{labels:domains, datasets:[{data:growthData, backgroundColor:growthColors}]},
        options:{
            responsive:true, maintainAspectRatio:false, animation:false, indexAxis:'y',
            plugins:{legend:{display:false}},
            scales:{
                x:{ticks:{color:'#94a3b8',callback:function(v){return v+'%'}},grid:{color:'rgba(148,163,184,0.1)'}},
                y:{ticks:{color:'#94a3b8',font:{size:10}},grid:{display:false}}
            }
        }
    });

    // Domain individual charts
    domains.forEach(function(dom) {
        var did = sid(dom);
        var canvasEl = document.getElementById('dch-'+did);
        if(!canvasEl) return;
        var vals = data.map(function(e){return (e[group]||{})[dom]||0});
        // Moving average 7
        var ma = vals.map(function(v,i){
            if(i<6) return null;
            var sum=0; for(var j=i-6;j<=i;j++) sum+=vals[j];
            return Math.round(sum/7);
        });
        allCharts['dch-'+did] = new Chart(canvasEl.getContext('2d'), {
            type:'line',
            data:{
                labels:labels,
                datasets:[
                    {label:'Index',data:vals,borderColor:PALETTE[domains.indexOf(dom)%PALETTE.length],tension:0.3,pointRadius:0,borderWidth:2},
                    {label:'MA7',data:ma,borderColor:'#94a3b8',borderDash:[5,5],tension:0.3,pointRadius:0,borderWidth:1}
                ]
            },
            options:{
                responsive:true, maintainAspectRatio:false, animation:false,
                plugins:{legend:{display:false}},
                scales:{
                    x:{display:false},
                    y:{ticks:{color:'#94a3b8',callback:function(v){return fmtNum(v)},maxTicksLimit:4},grid:{color:'rgba(148,163,184,0.08)'}}
                }
            }
        });
    });
}

// Init
buildOverview();
tabCreated.all = true;
</script>
</body></html>
