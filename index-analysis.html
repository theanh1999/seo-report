<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phân Tích Biến Động Index</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-adapter-date-fns/3.0.0/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#263348;--tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;--bd:#334155;--grn:#22c55e;--red:#ef4444;--blu:#3b82f6;--ylw:#eab308;--pur:#a855f7;--cyn:#06b6d4;--orn:#f97316;--pnk:#ec4899;--grid:rgba(148,163,184,0.1)}
[data-theme="light"]{--bg:#f1f5f9;--bg2:#fff;--bg3:#f8fafc;--tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;--bd:#e2e8f0;--grid:rgba(0,0,0,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6}
.ctn{max-width:1440px;margin:0 auto;padding:20px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
h1{font-size:1.5rem} h1 span{color:var(--blu)}
h2{font-size:1.15rem;margin:28px 0 14px;display:flex;align-items:center;gap:8px}
h2 .cnt{color:var(--tx3);font-weight:400;font-size:.85rem}
.ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:7px 14px;border:1px solid var(--bd);border-radius:8px;background:var(--bg2);color:var(--tx);cursor:pointer;font-size:.82rem;transition:.2s}
.btn:hover{background:var(--bg3)} .btn.on{background:var(--blu);color:#fff;border-color:var(--blu)}
select.btn{appearance:auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:16px;text-align:center}
.card .lb{font-size:.75rem;color:var(--tx3)} .card .vl{font-size:1.4rem;font-weight:700}
.card .ch{font-size:.8rem;margin-top:2px}
.up{color:var(--grn)} .dn{color:var(--red)} .nt{color:var(--tx3)}
.sec{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:22px}
.sec-t{font-size:1rem;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.cc{position:relative;width:100%} .cc canvas{max-height:400px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:18px;margin-bottom:24px}
.dc{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:16px;transition:.2s}
.dc:hover{border-color:var(--blu)}
.dh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:6px;flex-wrap:wrap}
.dn-name{font-weight:700;font-size:.95rem}
.badge{font-size:.65rem;padding:2px 8px;border-radius:12px;font-weight:600;text-transform:uppercase}
.b-nh{background:rgba(34,197,94,.15);color:var(--grn)} .b-ht{background:rgba(168,85,247,.15);color:var(--pur)} .b-dt{background:rgba(239,68,68,.15);color:var(--red)}
.ds{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.ds .sl{font-size:.68rem;color:var(--tx3)} .ds .sv{font-size:.88rem;font-weight:600}
.ds div{text-align:center}
.dcc canvas{max-height:180px}
.tbl{width:100%;border-collapse:collapse}
.tbl th,.tbl td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--bd);font-size:.82rem}
.tbl th{color:var(--tx3);font-weight:600;font-size:.72rem;text-transform:uppercase}
.tbl tr:hover td{background:var(--bg3)}
.rn{font-weight:700;color:var(--blu)}
.bar-bg{height:5px;background:var(--bd);border-radius:3px;margin-top:3px}
.bar-f{height:100%;border-radius:3px}
.tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.loading{text-align:center;padding:60px;color:var(--tx3);font-size:1.1rem}
.bk{color:var(--blu);text-decoration:none;font-size:.82rem} .bk:hover{text-decoration:underline}
@media(max-width:900px){.row2{grid-template-columns:1fr} .dg{grid-template-columns:1fr} .cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="ctn">
  <header>
    <div>
      <a href="google-index-report.html" class="bk">← Báo cáo tổng quan</a>
      <h1>Phân Tích <span>Biến Động Index</span></h1>
    </div>
    <div class="ctrl">
      <select class="btn" id="timeRange">
        <option value="30">30 ngày</option>
        <option value="60">60 ngày</option>
        <option value="90" selected>90 ngày</option>
        <option value="180">6 tháng</option>
        <option value="0">Tất cả</option>
      </select>
      <button class="btn" id="themeToggle">🌙</button>
    </div>
  </header>
  <div id="app"><div class="loading">Đang tải dữ liệu...</div></div>
</div>
<script>
const CAT={nha_hang:{label:'Nhà Hàng',badge:'b-nh',color:'#22c55e'},hotel:{label:'Hotel',badge:'b-ht',color:'#a855f7'},doi_thu:{label:'Đối Thủ',badge:'b-dt',color:'#ef4444'}};
const PAL=['#3b82f6','#22c55e','#ef4444','#eab308','#a855f7','#06b6d4','#f97316','#ec4899','#8b5cf6','#14b8a6','#f43f5e','#84cc16','#0ea5e9','#d946ef','#fb923c','#2dd4bf','#c084fc'];
let allH=[],charts={},isDark=true;

const thBtn=document.getElementById('themeToggle');
thBtn.onclick=()=>{isDark=!isDark;document.documentElement.setAttribute('data-theme',isDark?'':'light');thBtn.textContent=isDark?'🌙':'☀️';Object.values(charts).forEach(c=>{if(!c||!c.options)return;const g=isDark?'rgba(148,163,184,0.1)':'rgba(0,0,0,0.06)',t=isDark?'#94a3b8':'#475569';Object.values(c.options.scales||{}).forEach(s=>{if(s.grid)s.grid.color=g;if(s.ticks)s.ticks.color=t});c.update('none')})};
document.getElementById('timeRange').onchange=()=>render();

function filt(d){if(!d)return allH;const c=new Date();c.setDate(c.getDate()-d);const s=c.toISOString().slice(0,10);return allH.filter(e=>e.date>=s)}
function fmt(n){return(n==null||n===0)?'—':n.toLocaleString('vi-VN')}
function pct(o,n){if(!o||o===0)return{t:'N/A',c:'nt'};const p=((n-o)/o*100).toFixed(1);return p>0?{t:'+'+p+'%',c:'up'}:p<0?{t:p+'%',c:'dn'}:{t:'0%',c:'nt'}}
function getDoms(hist){const d={};for(const e of hist)for(const cat of['nha_hang','hotel','doi_thu'])for(const[dm,v]of Object.entries(e[cat]||{})){if(!d[dm])d[dm]={cat,pts:[]};if(v!=null&&v>0)d[dm].pts.push({d:e.date,v});}return d}

function mkChart(id,cfg){const cv=document.getElementById(id);if(!cv)return null;const ch=new Chart(cv.getContext('2d'),cfg);charts[id]=ch;return ch}

function render(){
const days=parseInt(document.getElementById('timeRange').value);
const hist=filt(days);
if(!hist.length){document.getElementById('app').innerHTML='<div class="loading">Không có dữ liệu</div>';return}

Object.values(charts).forEach(c=>c&&c.destroy&&c.destroy());charts={};
const doms=getDoms(hist);
const last=hist[hist.length-1],first=hist[0];
const tNow=(last.totals?.nha_hang||0)+(last.totals?.hotel||0)+(last.totals?.doi_thu||0);
const tBef=(first.totals?.nha_hang||0)+(first.totals?.hotel||0)+(first.totals?.doi_thu||0);

let h='';

// === SUMMARY CARDS ===
h+='<div class="cards">';
[{l:'Tổng Index',v:tNow,b:tBef},{l:'Nhà Hàng',v:last.totals?.nha_hang||0,b:first.totals?.nha_hang||0},{l:'Hotel',v:last.totals?.hotel||0,b:first.totals?.hotel||0},{l:'Đối Thủ',v:last.totals?.doi_thu||0,b:first.totals?.doi_thu||0},{l:'Website',v:Object.keys(doms).length,b:null}].forEach(it=>{
  const ch=it.b!=null?pct(it.b,it.v):{t:'',c:''};
  h+=`<div class="card"><div class="lb">${it.l}</div><div class="vl">${fmt(it.v)}</div>${ch.t?`<div class="ch ${ch.c}">${ch.t}</div>`:''}
  </div>`;
});
h+='</div>';

// === TABS ===
h+='<div class="tabs"><button class="btn on" data-tab="all">Tất cả</button>';
for(const[k,v]of Object.entries(CAT))h+=`<button class="btn" data-tab="${k}">${v.label}</button>`;
h+='</div>';

// ============================================
// SECTION 1: OVERVIEW - Tổng quan 3 nhóm
// ============================================
h+=`<div class="sec" data-cat="all"><div class="sec-t">Tổng quan Index 3 nhóm theo thời gian</div><div class="cc" style="height:360px"><canvas id="chOverview"></canvas></div></div>`;

// ============================================
// SECTION 2: GROUP CHARTS - Biểu đồ từng nhóm
// ============================================
for(const[cat,ci]of Object.entries(CAT)){
const catDoms=Object.entries(doms).filter(([d,i])=>i.cat===cat);
if(!catDoms.length)continue;
catDoms.sort((a,b)=>{const al=a[1].pts,bl=b[1].pts;return(bl.length?bl[bl.length-1].v:0)-(al.length?al[al.length-1].v:0)});

h+=`<h2 data-cat="${cat}"><span style="color:${ci.color}">●</span> ${ci.label} <span class="cnt">(${catDoms.length} website)</span></h2>`;

// Row: Stacked area + Pie chart
h+=`<div class="row2" data-cat="${cat}">`;

// Stacked area chart - all domains in this category
h+=`<div class="sec" style="margin-bottom:0"><div class="sec-t">Biến động từng website</div><div class="cc" style="height:320px"><canvas id="chStack_${cat}"></canvas></div></div>`;

// Pie chart - market share
h+=`<div class="sec" style="margin-bottom:0"><div class="sec-t">Tỷ lệ Index hiện tại</div><div class="cc" style="height:320px"><canvas id="chPie_${cat}"></canvas></div></div>`;

h+=`</div>`; // end row2

// Bar chart - growth comparison
h+=`<div class="sec" data-cat="${cat}"><div class="sec-t">So sánh tăng trưởng</div><div class="cc" style="height:${Math.max(200,catDoms.length*36)}px"><canvas id="chGrowth_${cat}"></canvas></div></div>`;

// Per-domain cards
h+=`<div class="dg" data-cat="${cat}">`;
for(const[dm,info]of catDoms){
  const pts=info.pts;
  if(pts.length<2){
    const lv=pts.length?pts[pts.length-1].v:0;
    h+=`<div class="dc" data-cat="${cat}"><div class="dh"><span class="dn-name">${dm}</span><span class="badge ${ci.badge}">${ci.label}</span></div>
    <div class="ds"><div><div class="sl">Hiện tại</div><div class="sv">${fmt(lv)}</div></div><div><div class="sl">Dữ liệu</div><div class="sv">${pts.length} ngày</div></div><div><div class="sl">Xu hướng</div><div class="sv nt">Chưa đủ</div></div></div></div>`;
    continue;
  }
  const fv=pts[0].v,lv=pts[pts.length-1].v,mx=Math.max(...pts.map(p=>p.v)),mn=Math.min(...pts.map(p=>p.v));
  const ch=pct(fv,lv);
  // 7-day trend
  let trend='—';
  if(pts.length>=7){const r7=pts.slice(-7).reduce((s,p)=>s+p.v,0)/7;const p7=pts.slice(-14,-7);if(p7.length){const pa=p7.reduce((s,p)=>s+p.v,0)/p7.length;trend=r7>pa*1.05?'📈 Tăng':r7<pa*0.95?'📉 Giảm':'➡️ Ổn định'}}
  // Daily volatility
  let volat=0;if(pts.length>=3){const diffs=[];for(let i=1;i<pts.length;i++){const d=Math.abs(pts[i].v-pts[i-1].v)/Math.max(pts[i-1].v,1)*100;diffs.push(d)}volat=(diffs.reduce((s,d)=>s+d,0)/diffs.length).toFixed(1)}
  const cid=dm.replace(/[^a-zA-Z0-9]/g,'_');

  h+=`<div class="dc" data-cat="${cat}"><div class="dh"><span class="dn-name">${dm}</span><span class="badge ${ci.badge}">${ci.label}</span></div>
  <div class="ds"><div><div class="sl">Hiện tại</div><div class="sv">${fmt(lv)}</div></div><div><div class="sl">Cao nhất</div><div class="sv">${fmt(mx)}</div></div><div><div class="sl">Tăng trưởng</div><div class="sv ${ch.c}">${ch.t}</div></div></div>
  <div class="ds"><div><div class="sl">Thấp nhất</div><div class="sv">${fmt(mn)}</div></div><div><div class="sl">Biến động TB</div><div class="sv">${volat}%/ngày</div></div><div><div class="sl">7 ngày</div><div class="sv">${trend}</div></div></div>
  <div class="dcc" style="height:180px"><canvas id="ch_${cid}"></canvas></div></div>`;
}
h+=`</div>`; // end dg
}

// ============================================
// SECTION 3: RANKING TABLE
// ============================================
h+=`<div class="sec"><div class="sec-t">Bảng xếp hạng tăng trưởng</div><div style="overflow-x:auto">
<table class="tbl"><thead><tr><th>#</th><th>Domain</th><th>Nhóm</th><th>Hiện tại</th><th>Đầu kỳ</th><th>Thay đổi</th><th>%</th><th>7 ngày</th></tr></thead><tbody id="rankTb"></tbody></table></div></div>`;

document.getElementById('app').innerHTML=h;

// === TAB LOGIC ===
document.querySelectorAll('.tabs .btn').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tabs .btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  const t=b.dataset.tab;
  document.querySelectorAll('[data-cat]').forEach(el=>{el.style.display=(t==='all'||el.dataset.cat===t)?'':'none'});
});

// === RENDER CHARTS ===

// 1. Overview chart
mkChart('chOverview',{type:'line',data:{datasets:Object.entries(CAT).map(([cat,ci])=>({
  label:ci.label,
  data:hist.filter(e=>(e.totals?.[cat]||0)>0).map(e=>({x:e.date,y:e.totals[cat]})),
  borderColor:ci.color,backgroundColor:ci.color+'18',borderWidth:2,pointRadius:0,pointHoverRadius:5,fill:true,tension:.3,spanGaps:true
}))},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
plugins:{tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y?.toLocaleString('vi-VN')}`}},legend:{labels:{color:'#94a3b8',usePointStyle:true,padding:14}}},
scales:{x:{type:'time',time:{unit:'week',tooltipFormat:'dd/MM/yyyy'},grid:{color:'var(--grid)'},ticks:{color:'#94a3b8',maxRotation:45}},y:{grid:{color:'var(--grid)'},ticks:{color:'#94a3b8',callback:v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v}}}}});

// 2. Per-category charts
for(const[cat,ci]of Object.entries(CAT)){
  const catDoms=Object.entries(doms).filter(([d,i])=>i.cat===cat);
  if(!catDoms.length)continue;
  catDoms.sort((a,b)=>{const al=a[1].pts,bl=b[1].pts;return(bl.length?bl[bl.length-1].v:0)-(al.length?al[al.length-1].v:0)});

  // STACKED AREA - each domain as a dataset
  const stackDS=catDoms.map(([dm,info],idx)=>({
    label:dm.replace(/\.(com|net|us\.com)$/,''),
    data:info.pts.map(p=>({x:p.d,y:p.v})),
    borderColor:PAL[idx%PAL.length],
    backgroundColor:PAL[idx%PAL.length]+'30',
    borderWidth:1.5,pointRadius:0,pointHoverRadius:4,fill:true,tension:.3,spanGaps:true
  }));
  mkChart('chStack_'+cat,{type:'line',data:{datasets:stackDS},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
  plugins:{tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y?.toLocaleString('vi-VN')}`}},legend:{position:'bottom',labels:{color:'#94a3b8',usePointStyle:true,boxWidth:6,padding:8,font:{size:10}}}},
  scales:{x:{type:'time',time:{unit:hist.length>90?'month':'week',tooltipFormat:'dd/MM/yyyy'},grid:{color:'var(--grid)'},ticks:{color:'#94a3b8',font:{size:9},maxRotation:0}},
  y:{stacked:false,grid:{color:'var(--grid)'},ticks:{color:'#94a3b8',font:{size:9},callback:v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v}}}}});

  // PIE - market share by latest value
  const pieData=catDoms.map(([dm,info])=>({label:dm.replace(/\.(com|net|us\.com)$/,''),value:info.pts.length?info.pts[info.pts.length-1].v:0})).filter(d=>d.value>0);
  mkChart('chPie_'+cat,{type:'doughnut',data:{labels:pieData.map(d=>d.label),datasets:[{data:pieData.map(d=>d.value),backgroundColor:pieData.map((_,i)=>PAL[i%PAL.length]),borderColor:'var(--bg2)',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#94a3b8',padding:8,font:{size:10},usePointStyle:true,boxWidth:8}},tooltip:{callbacks:{label:c=>{const total=c.dataset.data.reduce((s,v)=>s+v,0);const pct=(c.raw/total*100).toFixed(1);return `${c.label}: ${c.raw.toLocaleString('vi-VN')} (${pct}%)`}}}}}});

  // HORIZONTAL BAR - growth comparison
  const growthData=catDoms.map(([dm,info])=>{
    const pts=info.pts;if(pts.length<2)return{label:dm,growth:0,abs:0};
    const fv=pts[0].v,lv=pts[pts.length-1].v;
    return{label:dm.replace(/\.(com|net|us\.com)$/,''),growth:fv>0?((lv-fv)/fv*100):0,abs:lv-fv};
  }).sort((a,b)=>b.growth-a.growth);

  mkChart('chGrowth_'+cat,{type:'bar',data:{labels:growthData.map(d=>d.label),datasets:[
    {label:'% Tăng trưởng',data:growthData.map(d=>d.growth),backgroundColor:growthData.map(d=>d.growth>=0?'#22c55e80':'#ef444480'),borderColor:growthData.map(d=>d.growth>=0?'#22c55e':'#ef4444'),borderWidth:1}
  ]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
  plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw>=0?'+':''}${c.raw.toFixed(1)}%`}}},
  scales:{x:{grid:{color:'var(--grid)'},ticks:{color:'#94a3b8',font:{size:10},callback:v=>v+'%'}},y:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:10}}}}}});

  // PER-DOMAIN CHARTS
  for(const[dm,info]of catDoms){
    const pts=info.pts;if(pts.length<2)continue;
    const cid=dm.replace(/[^a-zA-Z0-9]/g,'_');
    // Moving average
    const ma=[];for(let i=0;i<pts.length;i++){const w=pts.slice(Math.max(0,i-6),i+1);ma.push({x:pts[i].d,y:Math.round(w.reduce((s,p)=>s+p.v,0)/w.length)})}
    // Daily change bars
    const chg=[];for(let i=1;i<pts.length;i++){chg.push({x:pts[i].d,y:pts[i].v-pts[i-1].v})}

    mkChart('ch_'+cid,{type:'line',data:{datasets:[
      {label:'Index',data:pts.map(p=>({x:p.d,y:p.v})),borderColor:ci.color,backgroundColor:ci.color+'12',borderWidth:1.5,pointRadius:pts.length>40?0:2,pointHoverRadius:4,fill:true,tension:.2,yAxisID:'y'},
      {label:'TB 7 ngày',data:ma,borderColor:'#eab308',borderWidth:1.5,borderDash:[4,3],pointRadius:0,fill:false,tension:.3,yAxisID:'y'},
      {type:'bar',label:'Thay đổi/ngày',data:chg,backgroundColor:chg.map(c=>c.y>=0?'rgba(34,197,94,0.3)':'rgba(239,68,68,0.3)'),borderColor:chg.map(c=>c.y>=0?'#22c55e':'#ef4444'),borderWidth:1,yAxisID:'y2',barPercentage:0.6}
    ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{tooltip:{callbacks:{label:c=>{const v=c.parsed.y;const s=c.dataset.label;if(s==='Thay đổi/ngày')return `${s}: ${v>=0?'+':''}${v?.toLocaleString('vi-VN')}`;return `${s}: ${v?.toLocaleString('vi-VN')}`}}},legend:{labels:{color:'#94a3b8',usePointStyle:true,boxWidth:6,padding:6,font:{size:9}}}},
    scales:{x:{type:'time',time:{unit:pts.length>90?'month':'week',tooltipFormat:'dd/MM/yyyy'},grid:{color:'rgba(148,163,184,0.06)'},ticks:{color:'#94a3b8',font:{size:8},maxRotation:0,maxTicksLimit:6}},
    y:{position:'left',grid:{color:'rgba(148,163,184,0.06)'},ticks:{color:'#94a3b8',font:{size:8},callback:v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v}},
    y2:{position:'right',grid:{display:false},ticks:{color:'#94a3b8',font:{size:8},callback:v=>v>=1e3?(v/1e3).toFixed(0)+'K':v}}}}});
  }
}

// 3. Ranking table
const tb=document.getElementById('rankTb');
if(tb){
const rows=[];
for(const[dm,info]of Object.entries(doms)){
  const pts=info.pts;if(!pts.length)continue;
  const fv=pts[0].v,lv=pts[pts.length-1].v,ch=lv-fv;
  const p=fv>0?((lv-fv)/fv*100):lv>0?100:0;
  let tr='—';if(pts.length>=7){const r=pts.slice(-7).reduce((s,p)=>s+p.v,0)/7;const pv=pts.slice(-14,-7);if(pv.length){const pa=pv.reduce((s,p)=>s+p.v,0)/pv.length;tr=r>pa*1.05?'📈 Tăng':r<pa*0.95?'📉 Giảm':'➡️ Ổn định'}}
  rows.push({dm,cat:info.cat,fv,lv,ch,p,tr});
}
rows.sort((a,b)=>b.p-a.p);
const mx=Math.max(...rows.map(r=>r.lv),1);
tb.innerHTML=rows.map((r,i)=>{
  const ci=CAT[r.cat];const cc=r.ch>0?'up':r.ch<0?'dn':'';const ps=r.p>0?'+'+r.p.toFixed(1)+'%':r.p.toFixed(1)+'%';const bw=(r.lv/mx*100).toFixed(1);
  return `<tr><td class="rn">${i+1}</td><td><strong>${r.dm}</strong><div class="bar-bg"><div class="bar-f" style="width:${bw}%;background:${ci.color}"></div></div></td><td><span class="badge ${ci.badge}">${ci.label}</span></td><td><strong>${fmt(r.lv)}</strong></td><td>${fmt(r.fv)}</td><td class="${cc}">${r.ch>0?'+':''}${fmt(r.ch)}</td><td class="${cc}"><strong>${ps}</strong></td><td>${r.tr}</td></tr>`;
}).join('');
}
} // end render

fetch('history.json').then(r=>r.json()).then(d=>{allH=d;render()}).catch(e=>{document.getElementById('app').innerHTML=`<div class="loading">Lỗi: ${e.message}</div>`});
</script>
</body>
